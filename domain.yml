version: "3.1"

intents:
  - greet
  - goodbye
  - affirm
  - deny
  - bot_challenge
  - inform_role
  - inform_experience
  - inform_skills
  - inform_salary

entities:
  - role
  - skill
  - experience_years
  - salary

slots:
  desired_role:
    type: text
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: role

  skills:
    type: list
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: skill

  experience_years:
    type: float
    influence_conversation: true
    mappings:
      - type: from_entity
        entity: experience_years

  salary_expectation:
    type: float
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: salary

responses:
  utter_greet:
    - text: "Hello! I am an HR screening bot. I will ask you a few questions to understand which role in our ML project team fits you best."

  utter_ask_role:
    - text: "Which role are you interested in: Project Manager, Data Analyst, Data Engineer, Data Scientist, or MLOps Engineer?"

  utter_ask_experience:
    - text: "How many years of relevant experience do you have?"

  utter_ask_skills:
    - text: "Please list your main professional skills and tools."

  utter_ask_salary:
    - text: "What are your salary expectations?"

  utter_goodbye:
    - text: "Goodbye! Thank you for your time."

  utter_iamabot:
    - text: "Yes, I am an HR screening bot powered by RASA."

actions:
  - action_evaluate_candidate

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
