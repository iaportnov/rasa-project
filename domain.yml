version: "3.1"

intents:
  - greet
  - goodbye
  - find_vacancy

entities:
  - experience_years
  - skills
  - salary_expected

slots:

  experience_years:
    type: float
    mappings:
      - type: from_text
        not_intent:
          - goodbye
        conditions:
          - active_loop: vacancy_form
            requested_slot: experience_years

  skills:
    type: list
    mappings:
      - type: from_text
        not_intent:
          - goodbye
        conditions:
          - active_loop: vacancy_form
            requested_slot: skills

  salary_expected:
    type: float
    mappings:
      - type: from_text
        not_intent:
          - goodbye
        conditions:
          - active_loop: vacancy_form
            requested_slot: salary_expected

forms:
  vacancy_form:
    required_slots:
      - experience_years
      - skills
      - salary_expected

responses:

  utter_greet:
    - text: "Здравствуйте! Помогу подобрать вакансию."

  utter_ask_experience_years:
    - text: "Сколько у вас лет опыта?"

  utter_ask_skills:
    - text: "Расскажите о своих навыках и технологиях, с которыми работали"

  utter_ask_salary_expected:
    - text: "Какая желаемая зарплата? (в тыс. руб.)"

  utter_default:
    - text: "Не понял сообщение."

  utter_goodbye:
    - text: "Хорошо, обращайтесь ещё."

actions:
  - validate_vacancy_form
  - action_evaluate_candidate
  - action_show_candidate_data