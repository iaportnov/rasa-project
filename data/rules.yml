version: "3.1"

rules:

- rule: старт формы
  steps:
    - intent: find_vacancy
    - action: vacancy_form
    - active_loop: vacancy_form

- rule: submit формы
  condition:
    - active_loop: vacancy_form
  steps:
    - action: vacancy_form
    - active_loop: null
    - action: action_evaluate_candidate

- rule: fallback
  steps:
    - intent: nlu_fallback
    - action: utter_default

- rule: greet
  steps:
    - intent: greet
    - action: utter_greet

- rule: stop form
  condition:
    - active_loop: vacancy_form
  steps:
    - intent: goodbye
    - action: action_deactivate_loop
    - active_loop: null
    - action: utter_goodbye

- rule: goodbye вне формы
  steps:
    - intent: goodbye
    - action: utter_goodbye