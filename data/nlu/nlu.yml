version: "3.1"

nlu:
  - intent: greet
    examples: |
      - привет
      - здравствуйте
      - добрый день
      - доброе утро
      - добрый вечер
      - приветствую
      - хай
      - hello
      - hi

  - intent: goodbye
    examples: |
      - пока
      - до свидания
      - всего доброго
      - спасибо, до свидания
      - спасибо, пока
      - хорошего дня
      - увидимся
      - bye

  - intent: affirm
    examples: |
      - да
      - верно
      - правильно
      - всё верно
      - да, всё так
      - подтверждаю
      - согласен
      - конечно
      - именно

  - intent: deny
    examples: |
      - нет
      - не совсем
      - неправильно
      - это не так
      - не согласен
      - нет, не верно
      - скорее нет
      - не думаю

